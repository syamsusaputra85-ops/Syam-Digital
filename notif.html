<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifikasi Sukses</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Poppins', sans-serif;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }
    
    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(2); opacity: 0; }
    }
    
    @keyframes checkmark {
      0% { stroke-dashoffset: 100; }
      100% { stroke-dashoffset: 0; }
    }
    
    @keyframes scale-in {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    @keyframes slide-up {
      0% { transform: translateY(30px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    
    @keyframes confetti {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-200px) rotate(720deg); opacity: 0; }
    }
    
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    
    @keyframes bounce-in {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    .float-animation {
      animation: float 3s ease-in-out infinite;
    }
    
    .pulse-ring {
      animation: pulse-ring 1.5s ease-out infinite;
    }
    
    .checkmark-animate {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: checkmark 0.8s ease-out 0.5s forwards;
    }
    
    .scale-in {
      animation: scale-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    
    .slide-up {
      animation: slide-up 0.6s ease-out forwards;
    }
    
    .slide-up-delay-1 {
      opacity: 0;
      animation: slide-up 0.6s ease-out 0.3s forwards;
    }
    
    .slide-up-delay-2 {
      opacity: 0;
      animation: slide-up 0.6s ease-out 0.5s forwards;
    }
    
    .slide-up-delay-3 {
      opacity: 0;
      animation: slide-up 0.6s ease-out 0.7s forwards;
    }
    
    .confetti-particle {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confetti 2s ease-out forwards;
    }
    
    .shimmer-text {
      background: linear-gradient(90deg, #10b981 0%, #34d399 25%, #6ee7b7 50%, #34d399 75%, #10b981 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }
    
    .bounce-in {
      animation: bounce-in 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    .gradient-border {
      position: relative;
    }
    
    .gradient-border::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 28px;
      background: linear-gradient(135deg, #10b981, #3b82f6, #8b5cf6, #10b981);
      background-size: 300% 300%;
      animation: shimmer 4s ease infinite;
      z-index: -1;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-auto">
  <main class="min-h-full w-full flex items-center justify-center p-6" style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);">
   <!-- Floating Background Elements -->
   <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-10 left-10 w-20 h-20 bg-emerald-500/20 rounded-full blur-xl float-animation"></div>
    <div class="absolute top-1/4 right-20 w-32 h-32 bg-blue-500/20 rounded-full blur-xl float-animation" style="animation-delay: -1s;"></div>
    <div class="absolute bottom-20 left-1/4 w-24 h-24 bg-purple-500/20 rounded-full blur-xl float-animation" style="animation-delay: -2s;"></div>
    <div class="absolute bottom-1/3 right-10 w-16 h-16 bg-emerald-400/20 rounded-full blur-xl float-animation" style="animation-delay: -0.5s;"></div>
   </div><!-- Confetti Container -->
   <div id="confetti-container" class="absolute inset-0 pointer-events-none overflow-hidden"></div><!-- Main Card -->
   <div class="relative z-10 gradient-border bounce-in">
    <div class="glass-card rounded-3xl p-10 md:p-14 max-w-lg w-full text-center shadow-2xl">
     <!-- Success Icon -->
     <div class="relative mx-auto w-28 h-28 mb-8">
      <!-- Pulse Rings -->
      <div class="absolute inset-0 rounded-full bg-emerald-400/30 pulse-ring"></div>
      <div class="absolute inset-0 rounded-full bg-emerald-400/20 pulse-ring" style="animation-delay: 0.5s;"></div><!-- Icon Circle -->
      <div class="relative w-28 h-28 rounded-full bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center scale-in shadow-lg shadow-emerald-500/40">
       <svg class="w-14 h-14 text-white" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path class="checkmark-animate" d="M5 13l4 4L19 7" />
       </svg>
      </div>
     </div><!-- Title -->
     <h1 id="main-title" class="text-2xl md:text-3xl font-bold text-slate-800 mb-4 slide-up-delay-1">Data Anda Berhasil Terkirim</h1><!-- Divider -->
     <div class="flex items-center justify-center gap-3 mb-4 slide-up-delay-1">
      <div class="h-px w-12 bg-gradient-to-r from-transparent to-emerald-400"></div>
      <div class="w-2 h-2 rounded-full bg-emerald-400"></div>
      <div class="h-px w-12 bg-gradient-to-l from-transparent to-emerald-400"></div>
     </div><!-- Subtitle -->
     <p id="subtitle-text" class="text-lg md:text-xl font-medium shimmer-text mb-8 slide-up-delay-2">Terima Kasih atas partisipasinya</p><!-- Additional Message -->
     <div class="bg-slate-50 rounded-2xl p-5 mb-8 slide-up-delay-2 border border-slate-100">
      <div class="flex items-center justify-center gap-3">
       <span class="text-2xl">📧</span>
       <p class="text-slate-600 text-sm">Kami akan menghubungi Anda segera</p>
      </div>
     </div><!-- Action Button --> <button id="close-btn" class="slide-up-delay-3 group relative px-8 py-4 bg-gradient-to-r from-emerald-500 to-emerald-600 text-white font-semibold rounded-2xl shadow-lg shadow-emerald-500/30 hover:shadow-xl hover:shadow-emerald-500/40 transform hover:-translate-y-1 transition-all duration-300 overflow-hidden"> <span class="relative z-10 flex items-center gap-2"> <span>Kembali ke Beranda</span>
       <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewbox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
       </svg></span>
      <div class="absolute inset-0 bg-gradient-to-r from-emerald-600 to-emerald-700 opacity-0 group-hover:opacity-100 transition-opacity"></div></button> <!-- Bottom Decoration -->
     <div class="mt-8 flex justify-center gap-2 slide-up-delay-3">
      <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> <span class="w-2 h-2 rounded-full bg-blue-400 animate-pulse" style="animation-delay: 0.2s;"></span> <span class="w-2 h-2 rounded-full bg-purple-400 animate-pulse" style="animation-delay: 0.4s;"></span>
     </div>
    </div>
   </div>
  </main>
  <script>
    const defaultConfig = {
      main_title: 'Data Anda Berhasil Terkirim',
      subtitle_text: 'Terima Kasih atas partisipasinya',
      background_color: '#0f172a',
      card_color: '#ffffff',
      primary_color: '#10b981',
      text_color: '#1e293b',
      accent_color: '#3b82f6',
      font_family: 'Poppins',
      font_size: 16
    };
    
    // Create confetti on load
    function createConfetti() {
      const container = document.getElementById('confetti-container');
      const colors = ['#10b981', '#3b82f6', '#8b5cf6', '#f59e0b', '#ef4444', '#ec4899'];
      
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'confetti-particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = '100%';
        particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        particle.style.animationDelay = Math.random() * 2 + 's';
        particle.style.animationDuration = (2 + Math.random() * 2) + 's';
        container.appendChild(particle);
        
        // Remove particle after animation
        setTimeout(() => particle.remove(), 4000);
      }
    }
    
    // Trigger confetti on load
    setTimeout(createConfetti, 500);
    
    // Button click effect
    document.getElementById('close-btn').addEventListener('click', function() {
      createConfetti();
      this.innerHTML = `
        <span class="relative z-10 flex items-center gap-2">
          <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span>Memproses...</span>
        </span>
      `;
      
      // Redirect after 1.5 seconds
      setTimeout(() => {
        window.open('https://syamfree.netlify.app/form', '_self');
      }, 1500);
    });
    
    async function onConfigChange(config) {
      const mainTitle = document.getElementById('main-title');
      const subtitleText = document.getElementById('subtitle-text');
      
      if (mainTitle) {
        mainTitle.textContent = config.main_title || defaultConfig.main_title;
        mainTitle.style.fontFamily = `${config.font_family || defaultConfig.font_family}, sans-serif`;
        mainTitle.style.color = config.text_color || defaultConfig.text_color;
      }
      
      if (subtitleText) {
        subtitleText.textContent = config.subtitle_text || defaultConfig.subtitle_text;
        subtitleText.style.fontFamily = `${config.font_family || defaultConfig.font_family}, sans-serif`;
      }
    }
    
    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => { config.background_color = value; window.elementSdk.setConfig({ background_color: value }); }
          },
          {
            get: () => config.card_color || defaultConfig.card_color,
            set: (value) => { config.card_color = value; window.elementSdk.setConfig({ card_color: value }); }
          },
          {
            get: () => config.primary_color || defaultConfig.primary_color,
            set: (value) => { config.primary_color = value; window.elementSdk.setConfig({ primary_color: value }); }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => { config.text_color = value; window.elementSdk.setConfig({ text_color: value }); }
          },
          {
            get: () => config.accent_color || defaultConfig.accent_color,
            set: (value) => { config.accent_color = value; window.elementSdk.setConfig({ accent_color: value }); }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (value) => { config.font_family = value; window.elementSdk.setConfig({ font_family: value }); }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (value) => { config.font_size = value; window.elementSdk.setConfig({ font_size: value }); }
        }
      };
    }
    
    function mapToEditPanelValues(config) {
      return new Map([
        ['main_title', config.main_title || defaultConfig.main_title],
        ['subtitle_text', config.subtitle_text || defaultConfig.subtitle_text]
      ]);
    }
    
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
  </script>
