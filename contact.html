<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Kontak</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
        * {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(255, 255, 255, 0.1);
        }
        
        .input-focus {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .input-focus:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px -10px rgba(102, 126, 234, 0.5);
        }
        
        .btn-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-gradient:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px -10px rgba(102, 126, 234, 0.6);
        }
        
        .btn-gradient:active {
            transform: translateY(-1px);
        }
        
        .float-animation {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        .float-animation-delay {
            animation: float 8s ease-in-out infinite;
            animation-delay: -2s;
        }
        
        .success-message {
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div class="h-full w-full gradient-bg overflow-auto relative"><!-- Decorative Elements -->
   <div class="absolute top-10 left-10 w-32 h-32 bg-white/10 rounded-full blur-2xl float-animation"></div>
   <div class="absolute bottom-20 right-10 w-48 h-48 bg-pink-300/20 rounded-full blur-3xl float-animation-delay"></div>
   <div class="absolute top-1/3 right-1/4 w-24 h-24 bg-purple-300/20 rounded-full blur-2xl float-animation"></div><!-- Main Content -->
   <div class="min-h-full flex items-center justify-center p-6">
    <div class="w-full max-w-md"><!-- Form Card -->
     <div class="glass-card rounded-3xl p-8 md:p-10"><!-- Header -->
      <div class="text-center mb-8"><!-- Icon -->
       <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 mb-5 shadow-lg">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
        </svg>
       </div>
       <h1 id="form-title" class="text-2xl md:text-3xl font-bold text-gray-800 mb-2">Hubungi Kami</h1>
       <p id="form-subtitle" class="text-gray-500">Kami senang mendengar dari Anda</p>
      </div><!-- Form -->
      <form id="contact-form" name="contact" method="POST" data-netlify="true"><!-- Nama Field -->
       <div class="mb-5"><label class="block text-sm font-semibold text-gray-700 mb-2" for="name"> <span class="flex items-center gap-2">
          <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
          </svg> Nama </span> </label> <input type="text" id="name" name="name" placeholder="Masukkan nama Anda" required class="input-focus w-full px-5 py-4 bg-gray-50 border-2 border-gray-100 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:border-indigo-400 focus:bg-white">
       </div><!-- Email Field -->
       <div class="mb-6"><label class="block text-sm font-semibold text-gray-700 mb-2" for="email"> <span class="flex items-center gap-2">
          <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
          </svg> Email </span> </label> <input type="email" id="email" name="email" placeholder="nama@email.com" required class="input-focus w-full px-5 py-4 bg-gray-50 border-2 border-gray-100 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:border-indigo-400 focus:bg-white">
       </div><!-- Submit Button --> <button type="submit" id="submit-btn" class="btn-gradient w-full py-4 px-6 text-white font-semibold rounded-xl flex items-center justify-center gap-2"> <span id="button-text">Kirim Pesan</span>
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
        </svg></button>
      </form><!-- Success Message (Hidden by default) -->
      <div id="success-message" class="hidden text-center mt-6 p-4 bg-green-50 rounded-xl success-message">
       <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-green-100 mb-3">
        <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>

       </div>
       <p class="text-green-700 font-medium">Pesan berhasil dikirim!</p>
       <p class="text-green-600 text-sm mt-1">Kami akan segera menghubungi Anda.</p>
      </div>
     </div><!-- Footer -->
     <p class="text-center text-white/70 text-sm mt-6">🔒 Data Anda aman bersama kami</p>
    </div>
   </div>
  </div>
  <script>
        const defaultConfig = {
            form_title: 'Hubungi Kami',
            form_subtitle: 'Kami senang mendengar dari Anda',
            button_text: 'Kirim Pesan',
            background_color: '#667eea',
            card_color: '#ffffff',
            text_color: '#1f2937',
            primary_action_color: '#667eea',
            secondary_color: '#f3f4f6',
            font_family: 'Plus Jakarta Sans',
            font_size: 16
        };

        async function onConfigChange(config) {
            // Update text content
            document.getElementById('form-title').textContent = config.form_title || defaultConfig.form_title;
            document.getElementById('form-subtitle').textContent = config.form_subtitle || defaultConfig.form_subtitle;
            document.getElementById('button-text').textContent = config.button_text || defaultConfig.button_text;
            
            // Update colors
            const bgColor = config.background_color || defaultConfig.background_color;
            const cardColor = config.card_color || defaultConfig.card_color;
            const textColor = config.text_color || defaultConfig.text_color;
            const primaryColor = config.primary_action_color || defaultConfig.primary_action_color;
            const secondaryColor = config.secondary_color || defaultConfig.secondary_color;
            
            // Apply background gradient
            const gradientBg = document.querySelector('.gradient-bg');
            if (gradientBg) {
                gradientBg.style.background = `linear-gradient(135deg, ${bgColor} 0%, ${adjustColor(bgColor, -20)} 50%, ${adjustColor(bgColor, 40)} 100%)`;
            }
            
            // Apply card color
            const card = document.querySelector('.glass-card');
            if (card) {
                card.style.backgroundColor = hexToRgba(cardColor, 0.95);
            }
            
            // Apply text color
            document.getElementById('form-title').style.color = textColor;
            document.querySelectorAll('label').forEach(label => {
                label.style.color = textColor;
            });
            
            // Apply button color
            const btn = document.getElementById('submit-btn');
            if (btn) {
                btn.style.background = `linear-gradient(135deg, ${primaryColor} 0%, ${adjustColor(primaryColor, -30)} 100%)`;
            }
            
            // Apply input background
            document.querySelectorAll('input').forEach(input => {
                input.style.backgroundColor = secondaryColor;
            });
            
            // Apply font
            const fontFamily = config.font_family || defaultConfig.font_family;
            const fontSize = config.font_size || defaultConfig.font_size;
            document.body.style.fontFamily = `${fontFamily}, sans-serif`;
            document.querySelectorAll('input').forEach(input => {
                input.style.fontSize = `${fontSize}px`;
            });
            document.getElementById('form-title').style.fontSize = `${fontSize * 1.75}px`;
            document.getElementById('form-subtitle').style.fontSize = `${fontSize}px`;
        }

        function adjustColor(hex, amount) {
            const num = parseInt(hex.replace('#', ''), 16);
            const r = Math.min(255, Math.max(0, (num >> 16) + amount));
            const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
            const b = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
            return `#${(1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1)}`;
        }

        function hexToRgba(hex, alpha) {
            const num = parseInt(hex.replace('#', ''), 16);
            const r = (num >> 16) & 255;
            const g = (num >> 8) & 255;
            const b = num & 255;
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function mapToCapabilities(config) {
            return {
                recolorables: [
                    {
                        get: () => config.background_color || defaultConfig.background_color,
                        set: (value) => { config.background_color = value; window.elementSdk.setConfig({ background_color: value }); }
                    },
                    {
                        get: () => config.card_color || defaultConfig.card_color,
                        set: (value) => { config.card_color = value; window.elementSdk.setConfig({ card_color: value }); }
                    },
                    {
                        get: () => config.text_color || defaultConfig.text_color,
                        set: (value) => { config.text_color = value; window.elementSdk.setConfig({ text_color: value }); }
                    },
                    {
                        get: () => config.primary_action_color || defaultConfig.primary_action_color,
                        set: (value) => { config.primary_action_color = value; window.elementSdk.setConfig({ primary_action_color: value }); }
                    },
                    {
                        get: () => config.secondary_color || defaultConfig.secondary_color,
                        set: (value) => { config.secondary_color = value; window.elementSdk.setConfig({ secondary_color: value }); }
                    }
                ],
                borderables: [],
                fontEditable: {
                    get: () => config.font_family || defaultConfig.font_family,
                    set: (value) => { config.font_family = value; window.elementSdk.setConfig({ font_family: value }); }
                },
                fontSizeable: {
                    get: () => config.font_size || defaultConfig.font_size,
                    set: (value) => { config.font_size = value; window.elementSdk.setConfig({ font_size: value }); }
                }
            };
        }

        function mapToEditPanelValues(config) {
            return new Map([
                ['form_title', config.form_title || defaultConfig.form_title],
                ['form_subtitle', config.form_subtitle || defaultConfig.form_subtitle],
                ['button_text', config.button_text || defaultConfig.button_text]
            ]);
        }

        // Initialize Element SDK
        if (window.elementSdk) {
            window.elementSdk.init({
                defaultConfig,
                onConfigChange,
                mapToCapabilities,
                mapToEditPanelValues
            });
        }

        // Form submission handling
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            // Let Netlify handle the form submission naturally
            // Show success message after a short delay for demo purposes
            const form = this;
            const successMessage = document.getElementById('success-message');
            
            // For demo/preview, show success animation
            setTimeout(() => {
                form.classList.add('hidden');
                successMessage.classList.remove('hidden');
            }, 100);
        });
    </script>
