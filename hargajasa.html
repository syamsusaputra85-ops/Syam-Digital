    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --navy: #0f172a;
            --gold: #b48d56;
            --light: #f8fafc;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
            color: var(--navy);
        }

        nav {
            background: var(--navy);
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 0.9rem; }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--white);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 { text-align: center; color: var(--navy); border-bottom: 3px solid var(--gold); padding-bottom: 10px; }

        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .price-card {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
        }

        .price-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .package-name { font-weight: bold; font-size: 1.2rem; color: var(--gold); margin-bottom: 10px; }
        .price-value { font-size: 1.8rem; font-weight: 700; margin: 15px 0; }
        .price-value span { font-size: 0.9rem; color: #64748b; }

        .features { list-style: none; padding: 0; text-align: left; font-size: 0.9rem; margin-bottom: 20px; }
        .features li { margin-bottom: 8px; padding-left: 20px; position: relative; }
        .features li::before { content: '✓'; position: absolute; left: 0; color: #22c55e; font-weight: bold; }

        .note {
            background: #fffbeb;
            border: 1px solid #fef3c7;
            padding: 15px;
            border-radius: 8px;
            margin-top: 30px;
            font-size: 0.85rem;
            color: #92400e;
        }
 :root {
            --professional-blue: #003366;
            --soft-blue: #f0f7ff;
            --accent: #d35400;
        }

        .bid-container {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border: 2px solid var(--professional-blue);
            border-radius: 10px;
            padding: 25px;
            background-color: #ffffff;
            max-width: 700px;
            margin: 20px auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .header-bid {
            color: var(--professional-blue);
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .bid-body {
            line-height: 1.8;
            color: #333;
        }

        .value-point {
            background: var(--soft-blue);
            padding: 10px 15px;
            border-radius: 5px;
            margin: 15px 0;
            border-left: 4px solid var(--professional-blue);
        }

        .closing-text {
            margin-top: 20px;
            font-weight: 500;
        }

        .highlight {
            color: var(--accent);
            font-weight: bold;
        }
    </style>
</head>
