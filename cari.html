<!DOCTYPE html>
<html>
  <head>
    <title>Form Pencarian</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.0.3/css/font-awesome.css" rel="stylesheet">
      <!-- font-awesome@6.2.0 icon Visit -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
  <!-- Source Code by www.javabitpro.com -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">

    <style>
      body, html {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #351c75 !important;
      }

      /* Container utama */
      .main-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        transition: all 0.5s ease; /* Animasi */
       
      }

      .main-container.moved {
        justify-content: flex-start; /* Geser ke atas jika data ditemukan */
        height: auto; /* Tinggi dinamis */
        padding-top: 20px;
      }

      /* Gambar di atas form */
      .logo-container img {
        width: 200px; /* Ukuran gambar */
        margin-bottom: 20px; /* Jarak antara gambar dan form */
        border-radius: 10px;
      }

      .search {
        width: 600px;
        height: 50px;
        background-color: #fff;
        border-radius: 40px;
        padding: 8px;
        display: flex;
        align-items: center;
        transition: all 0.5s ease;
      }

      .search_input {
        color: black;
        border: 0;
        outline: 0;
        background: none;
        width: 100%;
        padding: 0 10px;
      }

      .search_icon {
        height: 30px;
        width: 30px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 50%;
        color: white;
        background-color: black;
        cursor: pointer;
      }

      /* Hasil pencarian */
      #results {
        margin-top: 20px;
        width: 100%;
        color: red; 
        overflow-y: auto; /* Tambahkan scrollbar jika data melebihi tinggi maksimal */
        border: 2px solid #ddd; /* Tambahkan border untuk membedakan area hasil */
        border-radius: 10px;
        background-color: white;
      }
    </style>
    <script>
      function search() {
        const searchQuery = document.getElementById("searchInput").value;

        if (!searchQuery) {
          alert("Please enter a search query.");
          return;
        }

        // Modal Loading
        const loadingModal = new bootstrap.Modal(document.getElementById('loadingModal'));
        loadingModal.show();

        document.getElementById("loadingMessage").innerText = "Loading...";

        google.script.run
          .withSuccessHandler(displayResults)
          .withFailureHandler((error) => {
            document.getElementById("loadingMessage").innerText = "Error: " + error.message;
            console.error("Error:", error.message);
            setTimeout(() => {
              loadingModal.hide();
            }, 1500);
          })
          .getExternalData(searchQuery);
      }

      function displayResults(results) {
        let output = "";
        const loadingModal = bootstrap.Modal.getInstance(document.getElementById('loadingModal'));
        const successModal = new bootstrap.Modal(document.getElementById('successModal'));

        if (results.length === 0) {
          output = "<p>No results found.</p>";
          document.getElementById("loadingMessage").innerText = "No results found.";
        } else {
          results.forEach((result) => {
            output += `<br><h5>Lokasi Data Pada Spreadsheet : ${result.spreadsheetName}</h5>`;
            output += "<table class='table table-bordered'><thead><tr>";

            const headers = result.header;
            headers.forEach((header) => {
              output += `<th>${header}</th>`;
            });
            output += "</tr></thead><tbody>";

            result.data.forEach((row) => {
              output += "<tr>";
              row.forEach((cell) => {
                output += `<td>${cell}</td>`;
              });
              output += "</tr>";
            });

            output += "</tbody></table>";
          });

          document.getElementById("loadingMessage").innerText = "Search completed!";
          successModal.show();
        }

        document.getElementById("results").innerHTML = output;

        // Geser form pencarian ke atas
        document.querySelector('.main-container').classList.add('moved');

        setTimeout(() => {
          loadingModal.hide();
        }, 1500);
      }

      function handleEnterKey(event) {
        if (event.key === "Enter") {
          search();
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        const searchInput = document.getElementById("searchInput");
        searchInput.addEventListener("keydown", handleEnterKey);
      });
    </script>
  </head>
  <body>
    <!-- Container Utama -->
    <div class="container main-container">
      <!-- Gambar Logo -->
      <div class="logo-container">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEimPFN0bpntWh2IO7u__r-9mkfWnXzPvs7ywWRacH58YOJ_mtWY9KtkFICKLi9xYWqL-avQ_-KqM41clvULDhSTAbzS2HrbjHv7487WZtOiktu73SKyzye7p0khK5NFM0OH-akcnmJ59u7r_2wY4Gwx5ThjpKfZQ3wUwRPA4KfL4j1Q_aI7BuCPwOhgykgb/s320/SYAMDIGITAL3.gif" alt="Logo">
      </div>
      <!-- Form Pencarian -->
      <div class="search">
        <input type="text" id="searchInput" class="search_input" placeholder="Masukkan kata kunci..." />
        <button class="search_icon" onclick="search()">
          <i class="fa fa-search"></i>
        </button>
      </div>
    </div>

    <!-- Tempat Menampilkan Hasil -->
    <div id="results" class="container"></div>
    <br>
    <!-- Modal Loading -->
    <div class="modal fade" id="loadingModal" tabindex="-1" aria-labelledby="loadingModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="loadingModalLabel">Searching...</h5>
          </div>
          <div class="modal-body">
            <div id="loadingMessage">Loading...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Success -->
    <div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="successModalLabel">Success</h5>
          </div>
          <div class="modal-body">
            <span class="text-success">✔️ Search completed successfully!</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
